[config.site]
title = "dodola"
description = "记录和分享我的开发者旅程"
pageTitle = "dodola | Digital Space"
pageDescription = "dodola 的个人数字空间：技术文章、开发笔记、AI-native workflow 与生活碎片。"
url = "https://dodolalorc.cn"
repository = "https://github.com/dodolalorc/digital-site"
footerNote = "© 2026 dodola. Built with Astro Navfolio."

[config.theme]
# 可用色盘：
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "green-vivid"

[config.fonts]
# 英文与代码感 UI 字体
en = "Maple Mono"
code = "Monaco"
# 模板内可直接选择：ChillRoundM、LXGW WenKai
# 中文阅读字体
zh = "ChillRoundM"
# 中文完整字体文件
file = "/fonts/ChillRoundM.ttf"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.math]
render = "katex" # "katex" | "mathjax"

[config.comments]
enabled = false
provider = "none"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.pages.blog]
title = "技术与笔记"
kicker = "Notebook archive"
subtitle = "旧文和开发杂记。"
note = "从 ACM 题解到前端工程，从工具链折腾到 AI workflow，把学习和实践留下来。"
postsPerPage = 6
# date-fns 使用的日期格式模板
dateFormat = "yyyy-MM-dd"
# 元信息分隔符。可使用 "|"、"/" 等字符，也可以使用特殊值 "icon"
metadataSeparator = "icon"
# 文章列表封面样式："card" 保留带边框的缩略图，"mask" 将图片融合到右侧。
coverImageStyle = "mask"

[config.pages.blog.categories]
title = "分类"
kicker = "Browse notes"
subtitle = "按主题翻找文章。"
note = "把算法、前端、工具、项目和杂谈收在不同抽屉里，方便回看。"

[config.pages.blog.series]
title = "系列"
kicker = "Reading paths"
subtitle = "顺着一条线读下去。"
note = "相互关联的文章会被串成阅读路径，适合系统补课。"

[config.pages.projects]
title = "项目"
kicker = "Project shelf"
subtitle = "玩具项目集合"
note = "记录一些能跑起来、能复用、也能继续长大的实践。"

[config.pages.vibe]
title = "DD空间"
kicker = ""
subtitle = "生活、旅行和一些没那么正式的片段。"
note = "类似于朋友圈/QQ空间的地方"
showTrail = true

[config.comments.giscus]
repo = "dodolalorc/dodolalorc.github.io"
repo_id = "R_kgDOLYjsRQ"
category = "Announcements"
category_id = "DIC_kwDOLYjsRc4Clp7p"
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "zh-CN"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
