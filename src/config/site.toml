handle = "@dodolalorc"
role = "一只写代码的🐖"
company = "@ByteDance"
location = "Shenzhen, China"
email = "dodolalorc@gmail.com"
website = "https://dodolalorc.cn/"
github = "https://github.com/dodolalorc"
meta = "2002 / INTJ-A / Frontend & AI Products"
avatar = "https://avatars.githubusercontent.com/u/114007020?v=4"

